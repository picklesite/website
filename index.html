<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Picklebloom</title>
  <meta name="description" content="I'm an artist and I also make videos about indie stuff, mostly project moon!" />
  <meta name="theme-color" content="#2a0b0b" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Picklebloom" />
  <meta property="og:title" content="Picklebloom" />
  <meta property="og:description"
    content="I'm an artist and I also make videos about indie stuff, mostly project moon!" />
  <meta property="og:image" content="assets/pickle icon.png" />
  <meta property="og:image:alt" content="Picklebloom profile and links" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Picklebloom" />
  <meta name="twitter:description"
    content="I'm an artist and I also make videos about indie stuff, mostly project moon!" />
  <meta name="twitter:image" content="assets/pickle icon.png" />
  <meta name="twitter:image:alt" content="Picklebloom profile and links" />
  <link rel="icon" type="image/png" href="assets/Screenshot_10.png" />
  <link rel="apple-touch-icon" href="assets/Screenshot_10.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="assets/picklebloom clouds background.mp4" type="video/mp4" />
  </video>

  <div class="bg-overlay"></div>

  <main class="shell">
    <section class="card profile-card">
      <img class="banner" src="assets/logo.png" alt="Profile banner" />
      <img class="avatar" src="assets/pickle icon.png" alt="Profile picture" />
      <p class="bio">
        I’m an artist and I also make videos about indie stuff, mostly project moon!
      </p>
    </section>

    <section class="card links-card">
      <h2>Find me here!</h2>
      <ul class="links-list">
        <li class="link-item" style="--stagger: 0">
          <a class="link-anchor" href="https://www.youtube.com/@PickleBloom?sub_confirmation=1" target="_blank" rel="noopener noreferrer">
            <div>
              <div class="link-title">YouTube</div>
            </div>
            <span class="arrow">&gt;</span>
          </a>
        </li>
        <li class="link-item" style="--stagger: 1">
          <a class="link-anchor" href="https://discord.gg/CxZsvE8xh5" target="_blank" rel="noopener noreferrer">
            <div>
              <div class="link-title">Discord server</div>
            </div>
            <span class="arrow">&gt;</span>
          </a>
        </li>
        <li class="link-item" style="--stagger: 2">
          <a class="link-anchor" href="https://vgen.co/picklebloom" target="_blank" rel="noopener noreferrer">
            <div>
              <div class="link-title">Commission me!</div>
            </div>
            <span class="arrow">&gt;</span>
          </a>
        </li>
        <li class="link-item" style="--stagger: 3">
          <a class="link-anchor" href="https://www.tiktok.com/@picklebloom_" target="_blank" rel="noopener noreferrer">
            <div>
              <div class="link-title">TikTok</div>
            </div>
            <span class="arrow">&gt;</span>
          </a>
        </li>
        <li class="link-item" style="--stagger: 4">
          <a class="link-anchor" href="https://acggoods.com/store/picklebloom?from=view_shop&tab=all-items"
            target="_blank" rel="noopener noreferrer">
            <div>
              <div class="link-title">Buy my merch!</div>
            </div>
            <span class="arrow">&gt;</span>
          </a>
        </li>
      </ul>
    </section>
  </main>

  <footer class="site-footer">
    <span class="copyright">&copy; Picklebloom 2026</span>
    <img class="floating-sticker" src="assets/dead.png" alt="Decorative sticker" />
  </footer>
</body>

</html>
